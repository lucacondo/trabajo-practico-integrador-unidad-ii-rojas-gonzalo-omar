<!doctype html>

          <button
            class="navbar-toggler"

            data-bs-toggle="collapse"

                  class="nav-link text-black"
                  href="/Carreras.html"

              </li>
              <li class="nav-item">
                <a

                  href="/Contactos.html"
                  target="_blank"
                  >CONTACTOS</a
                >
              </li>
            </ul>
          </div>
        </div>

      <main>
